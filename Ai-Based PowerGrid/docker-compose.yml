version: '3.8'
services:
  # Message Broker for Event-Driven Async Jobs
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always

  # Observability Stack: Log streaming & Visualization
  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped
    depends_on:
      - loki
