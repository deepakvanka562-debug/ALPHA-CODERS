<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Grid AI - Simple Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        
        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-login {
            background: #667eea;
            color: white;
        }
        
        .btn-login:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-predict {
            background: #48bb78;
            color: white;
        }
        
        .btn-predict:hover {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.4);
        }
        
        .btn-check {
            background: #ed8936;
            color: white;
        }
        
        .btn-check:hover {
            background: #dd6b20;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(237, 137, 54, 0.4);
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f7fafc;
            border-left: 4px solid #667eea;
            border-radius: 8px;
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        .result h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
            color: #555;
        }
        
        .result-item:last-child {
            border-bottom: none;
        }
        
        .result-value {
            font-weight: 600;
            color: #667eea;
        }
        
        .status {
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: 600;
            display: none;
        }
        
        .status.show {
            display: block;
        }
        
        .status.success {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .status.error {
            background: #fed7d7;
            color: #742a2a;
        }
        
        .status.loading {
            background: #bee3f8;
            color: #2c5282;
        }
        
        .auth-section, .predict-section {
            display: none;
        }
        
        .auth-section.show, .predict-section.show {
            display: block;
        }
        
        .divider {
            text-align: center;
            margin: 30px 0 20px;
            color: #999;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .logout-btn {
            width: 100%;
            background: #f56565;
            color: white;
            margin-top: 20px;
        }
        
        .logout-btn:hover {
            background: #e53e3e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Power Grid AI</h1>
        
        <!-- Authentication Section -->
        <div class="auth-section show">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" value="admin">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" value="password">
            </div>
            
            <button class="btn-login" onclick="login()">Login</button>
            
            <div id="loginStatus" class="status"></div>
        </div>
        
        <div class="divider" id="divider" style="display: none;">Logged In</div>
        
        <!-- Prediction Section -->
        <div class="predict-section">
            <div class="form-group">
                <label for="zone">Zone Name</label>
                <input type="text" id="zone" placeholder="e.g., Zone-A" value="Zone-A">
            </div>
            
            <div class="form-group">
                <label for="voltage">Voltage (kV)</label>
                <input type="number" id="voltage" placeholder="e.g., 230" value="230">
            </div>
            
            <div class="form-group">
                <label for="load">Load (MW)</label>
                <input type="number" id="load" placeholder="e.g., 150" value="150">
            </div>
            
            <div class="form-group">
                <label for="temp">Temperature (°C)</label>
                <input type="number" id="temp" placeholder="e.g., 35" value="35">
            </div>
            
            <div class="button-group">
                <button class="btn-predict" onclick="predict()">Run Prediction</button>
                <button class="btn-check" onclick="checkStatus()">Check Status</button>
            </div>
            
            <div id="predictStatus" class="status"></div>
            
            <div id="result" class="result">
                <h3>📊 Prediction Results</h3>
                <div class="result-item">
                    <span>Failure Probability:</span>
                    <span class="result-value" id="probValue">-</span>
                </div>
                <div class="result-item">
                    <span>Risk Level:</span>
                    <span class="result-value" id="riskValue">-</span>
                </div>
                <div class="result-item">
                    <span>Expected Delay:</span>
                    <span class="result-value" id="delayValue">-</span>
                </div>
                <div class="result-item">
                    <span>Zone:</span>
                    <span class="result-value" id="zoneValue">-</span>
                </div>
            </div>
            
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        let currentToken = null;
        let currentTaskId = null;
        const API_URL = 'http://localhost:5000';
        
        function showStatus(message, type = 'success') {
            const loginStatus = document.getElementById('loginStatus');
            const predictStatus = document.getElementById('predictStatus');
            const target = currentToken ? predictStatus : loginStatus;
            
            target.textContent = message;
            target.className = `status show ${type}`;
        }
        
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showStatus('Please enter username and password', 'error');
                return;
            }
            
            try {
                showStatus('Logging in...', 'loading');
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    currentToken = data.access_token;
                    
                    // Show prediction section
                    document.querySelector('.auth-section').classList.remove('show');
                    document.querySelector('.predict-section').classList.add('show');
                    document.getElementById('divider').style.display = 'block';
                    
                    showStatus('✓ Logged in successfully!', 'success');
                } else {
                    showStatus('Login failed', 'error');
                }
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
            }
        }
        
        async function predict() {
            if (!currentToken) {
                showStatus('Please login first', 'error');
                return;
            }
            
            const zone = document.getElementById('zone').value;
            const voltage = parseFloat(document.getElementById('voltage').value);
            const load = parseFloat(document.getElementById('load').value);
            const temp = parseFloat(document.getElementById('temp').value);
            
            try {
                showStatus('Running prediction...', 'loading');
                const response = await fetch(`${API_URL}/predict`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({
                        zone_name: zone,
                        voltage,
                        load,
                        temperature: temp
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    currentTaskId = data.task_id;
                    showStatus(`✓ Prediction started! Task ID: ${currentTaskId}`, 'success');
                    
                    // Auto-check status after 2 seconds
                    setTimeout(checkStatus, 2000);
                } else {
                    showStatus('Prediction failed', 'error');
                }
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
            }
        }
        
        async function checkStatus() {
            if (!currentToken || !currentTaskId) {
                showStatus('No active task', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/task-status/${currentTaskId}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${currentToken}`
                    }
                });
                
                const data = await response.json();
                
                if (data.status === 'finished') {
                    showStatus('✓ Prediction completed!', 'success');
                    document.getElementById('probValue').textContent = `${data.failure_probability * 100}%`;
                    document.getElementById('riskValue').textContent = data.risk_level;
                    document.getElementById('delayValue').textContent = `${data.expected_delay_hours} hours`;
                    document.getElementById('zoneValue').textContent = data.zone_name;
                    document.getElementById('result').classList.add('show');
                } else if (data.status === 'processing') {
                    showStatus('⏳ Still processing...', 'loading');
                    setTimeout(checkStatus, 1000);
                } else if (data.status === 'failed') {
                    showStatus('✗ Prediction failed', 'error');
                }
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
            }
        }
        
        function logout() {
            currentToken = null;
            currentTaskId = null;
            document.querySelector('.auth-section').classList.add('show');
            document.querySelector('.predict-section').classList.remove('show');
            document.getElementById('divider').style.display = 'none';
            document.getElementById('result').classList.remove('show');
            document.getElementById('loginStatus').className = 'status';
            showStatus('Logged out', 'success');
        }
    </script>
</body>
</html>
